<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📱 Stock Research — Mobile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;font-size:14px;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:700;flex:1}
.header span{font-size:11px;color:#8b949e}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;margin:12px;padding:14px}
.label{font-size:11px;color:#8b949e;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input[type=url]{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px;color:#e6edf3;font-size:13px;outline:none}
input[type=url]:focus{border-color:#2563eb}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;letter-spacing:.2px}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:active{background:#1d4ed8}
.btn-blue:disabled{background:#374151;color:#6b7280;cursor:not-allowed}
.status-box{background:#0d1117;border-radius:8px;padding:12px;margin-top:10px;font-size:12px;font-family:monospace;color:#8b949e;max-height:140px;overflow-y:auto;line-height:1.8;display:none}
.ok{color:#3fb950}.err{color:#f85149}.warn{color:#e3b341}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.sheet-card{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px;cursor:pointer}
.sheet-card:active{border-color:#2563eb;background:#0d1f3c}
.sheet-name{font-size:12px;font-weight:600;color:#e6edf3;margin-bottom:3px}
.sheet-count{font-size:11px;color:#8b949e}
.sheet-status{font-size:14px;float:right}
.data-view{background:#161b22;border:1px solid #30363d;border-radius:12px;margin:12px;padding:14px;display:none}
.data-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.back-btn{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 12px;color:#e6edf3;font-size:12px;cursor:pointer}
.data-title{font-size:14px;font-weight:700;flex:1}
.data-count{font-size:11px;color:#8b949e}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
th{background:#21262d;color:#8b949e;padding:7px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;border-bottom:1px solid #30363d;position:sticky;top:0}
td{padding:7px 8px;border-bottom:1px solid #21262d;color:#e6edf3;white-space:nowrap}
tr:hover td{background:#21262d}
.pos{color:#3fb950}.neg{color:#f85149}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.pill-blue{background:#0d1f3c;color:#58a6ff}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:8px 10px;color:#e6edf3;font-size:13px;outline:none}
.empty{text-align:center;padding:30px;color:#8b949e;font-size:13px}
.info-row{display:flex;justify-content:space-between;font-size:11px;color:#8b949e;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:20px">📊</span>
  <h1>Stock Research</h1>
  <span id="hdr-status">Mobile View</span>
</div>

<!-- SETUP CARD -->
<div class="card" id="setup-card">
  <div class="label">Apps Script URL</div>
  <input type="url" id="url-input" placeholder="https://script.google.com/macros/s/.../exec">
  <button class="btn btn-blue" id="pull-btn" onclick="doPull()">📥 Pull Data from Google Sheets</button>
  <div id="status-log" class="status-box"></div>
</div>

<!-- SHEETS LIST CARD -->
<div class="card" id="sheets-card" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="label" style="margin:0">Sheets Loaded</div>
    <button onclick="resetAll()" style="background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 10px;color:#8b949e;font-size:11px;cursor:pointer">🔄 Re-Pull</button>
  </div>
  <div class="sheet-grid" id="sheet-grid"></div>
</div>

<!-- DATA VIEW -->
<div class="data-view" id="data-view">
  <div class="data-header">
    <button class="back-btn" onclick="backToList()">← Back</button>
    <div class="data-title" id="data-title"></div>
    <div class="data-count" id="data-count"></div>
  </div>
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Search..." oninput="filterTable(this.value)">
  </div>
  <div class="info-row">
    <span id="date-info"></span>
    <span id="row-info"></span>
  </div>
  <div class="tbl-wrap">
    <table id="data-table">
      <thead id="tbl-head"></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>

<script>
var APP_DATA = {};
var CURRENT_SHEET = '';
var ALL_ROWS = [];

var URL_KEY = 'sr_mobile_url';

window.onload = function() {
  var saved = localStorage.getItem(URL_KEY) || '';
  if (saved) {
    document.getElementById('url-input').value = saved;
    // Auto-pull if URL saved
    var savedData = localStorage.getItem('sr_mobile_data');
    if (savedData) {
      try {
        APP_DATA = JSON.parse(savedData);
        showSheetsList();
        log('✓ Cached data loaded — Re-Pull se latest lao', 'ok');
      } catch(e) { }
    }
  }
};

function log(msg, cls) {
  var el = document.getElementById('status-log');
  el.style.display = 'block';
  el.innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

async function doPull() {
  var url = document.getElementById('url-input').value.trim();
  if (!url || !url.includes('/exec')) {
    alert('Sahi Apps Script URL daalo — script.google.com/macros/s/.../exec');
    return;
  }
  localStorage.setItem(URL_KEY, url);

  var btn = document.getElementById('pull-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Pulling...';

  var logEl = document.getElementById('status-log');
  logEl.style.display = 'block';
  logEl.innerHTML = '';
  APP_DATA = {};

  log('🚀 Connecting to Google Sheets...');

  // Step 1: Get tab list
  var tabs = [];
  try {
    var data = await apiFetch(url);
    tabs = data.tabs || [];
    if (!tabs.length) throw new Error('No tabs found');
    log('✓ ' + tabs.length + ' sheets mili: ' + tabs.slice(0,4).join(', ') + (tabs.length > 4 ? '...' : ''), 'ok');
  } catch(e) {
    log('❌ Connect fail: ' + e.message, 'err');
    log('→ Apps Script URL check karo', 'warn');
    btn.disabled = false; btn.textContent = '📥 Pull Data from Google Sheets';
    return;
  }

  document.getElementById('hdr-status').textContent = tabs.length + ' sheets';

  // Step 2: Fetch each tab
  var IMPORTANT = ['Bhav Copy','Market Breadth','Price Gainers','Volume Shockers','52 Week High','All Time High','Delivery Spike','Sector Rotation','SECTOR_MASTER','FNO_MASTER','Open Intrest','Open Interest'];
  var toFetch = tabs.filter(function(t) {
    return IMPORTANT.some(function(i) { return t.toLowerCase() === i.toLowerCase(); });
  });
  if (!toFetch.length) toFetch = tabs.slice(0, 12);

  var ok = 0;
  for (var i = 0; i < toFetch.length; i++) {
    var tab = toFetch[i];
    log('⬇ ' + tab + '...');
    try {
      var res = await apiFetch(url + '?sheet=' + encodeURIComponent(tab));
      var rows = res.rows || [];
      APP_DATA[tab] = rows;
      log('✓ ' + tab + ' — ' + rows.length + ' rows', 'ok');
      ok++;
    } catch(e) {
      log('⚠ ' + tab + ': ' + e.message, 'warn');
    }
  }

  // Save to localStorage
  try { localStorage.setItem('sr_mobile_data', JSON.stringify(APP_DATA)); } catch(e) {}

  log('─── Done: ' + ok + '/' + toFetch.length + ' sheets ───', ok > 0 ? 'ok' : 'err');
  btn.disabled = false;
  btn.textContent = '📥 Pull Data from Google Sheets';

  if (ok > 0) showSheetsList();
}

async function apiFetch(url) {
  var resp = await fetch(url, { redirect: 'follow' });
  var text = await resp.text();
  return JSON.parse(text);
}

var ICONS = {
  'Bhav Copy': '📋', 'Market Breadth': '📉', 'Price Gainers': '💹',
  'Volume Shockers': '🔊', '52 Week High': '📅', 'All Time High': '🏆',
  'Delivery Spike': '🚚', 'Sector Rotation': '📈', 'SECTOR_MASTER': '📋',
  'FNO_MASTER': '🔢', 'Open Intrest': '📊', 'Open Interest': '📊'
};

function showSheetsList() {
  document.getElementById('sheets-card').style.display = 'block';
  var grid = document.getElementById('sheet-grid');
  grid.innerHTML = '';
  Object.keys(APP_DATA).forEach(function(sheet) {
    var rows = APP_DATA[sheet] || [];
    var icon = ICONS[sheet] || '📄';
    var div = document.createElement('div');
    div.className = 'sheet-card';
    div.innerHTML = '<div class="sheet-name">' + icon + ' ' + sheet + '</div><div class="sheet-count">' + rows.length + ' rows</div>';
    div.onclick = function() { openSheet(sheet); };
    grid.appendChild(div);
  });
}

function openSheet(name) {
  CURRENT_SHEET = name;
  ALL_ROWS = APP_DATA[name] || [];

  document.getElementById('data-title').textContent = name;
  document.getElementById('data-count').textContent = ALL_ROWS.length + ' rows';
  document.getElementById('search-input').value = '';
  document.getElementById('date-info').textContent = '';
  document.getElementById('row-info').textContent = '';

  // Find unique dates
  var dates = [];
  var dateKey = '';
  if (ALL_ROWS.length) {
    ['Date','date','DATE'].forEach(function(k) { if (ALL_ROWS[0][k] !== undefined && !dateKey) dateKey = k; });
    if (dateKey) {
      var seen = {};
      ALL_ROWS.forEach(function(r) { if (r[dateKey] && !seen[r[dateKey]]) { seen[r[dateKey]] = 1; dates.push(r[dateKey]); } });
      if (dates.length) document.getElementById('date-info').textContent = '📅 ' + dates.length + ' dates | Latest: ' + dates[dates.length-1];
    }
  }

  renderTable(ALL_ROWS);
  document.getElementById('sheets-card').style.display = 'none';
  document.getElementById('setup-card').style.display = 'none';
  document.getElementById('data-view').style.display = 'block';
  window.scrollTo(0,0);
}

function renderTable(rows) {
  var head = document.getElementById('tbl-head');
  var body = document.getElementById('tbl-body');
  document.getElementById('row-info').textContent = rows.length + ' rows shown';

  if (!rows.length) {
    head.innerHTML = '';
    body.innerHTML = '<tr><td class="empty" colspan="10">No data</td></tr>';
    return;
  }

  var cols = Object.keys(rows[0]).slice(0, 12);
  head.innerHTML = '<tr>' + cols.map(function(c) { return '<th>' + c + '</th>'; }).join('') + '</tr>';

  body.innerHTML = rows.slice(0, 500).map(function(row) {
    return '<tr>' + cols.map(function(c) {
      var v = row[c] !== undefined ? row[c] : '';
      var cls = '';
      if (typeof v === 'number' || (typeof v === 'string' && v.match(/^-?\d+\.?\d*%?$/))) {
        var n = parseFloat(v);
        if (!isNaN(n)) cls = n > 0 ? ' class="pos"' : n < 0 ? ' class="neg"' : '';
      }
      return '<td' + cls + '>' + v + '</td>';
    }).join('') + '</tr>';
  }).join('');
}

function filterTable(q) {
  q = q.toLowerCase().trim();
  if (!q) { renderTable(ALL_ROWS); return; }
  var filtered = ALL_ROWS.filter(function(row) {
    return Object.values(row).some(function(v) { return String(v).toLowerCase().includes(q); });
  });
  renderTable(filtered);
}

function backToList() {
  document.getElementById('data-view').style.display = 'none';
  document.getElementById('sheets-card').style.display = 'block';
  document.getElementById('setup-card').style.display = 'block';
  window.scrollTo(0,0);
}

function resetAll() {
  document.getElementById('sheets-card').style.display = 'none';
  document.getElementById('status-log').innerHTML = '';
  doPull();
}
</script>
</body>
</html>
